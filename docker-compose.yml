version: '3.9'

services:
  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  squash_db:
    image: postgres:15
    container_name: squash_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: squashtm
      POSTGRES_USER: squashtm
      POSTGRES_PASSWORD: squashtm
    volumes:
      - squash_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squashtm"]
      interval: 10s
      timeout: 5s
      retries: 5

  squash:
    image: squashtest/squash-tm:latest
    container_name: squash
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      squash_db:
        condition: service_healthy
    environment:
      SQTM_DB_TYPE: postgresql
      SQTM_DB_HOST: squash_db
      SQTM_DB_PORT: 5432
      SQTM_DB_NAME: squashtm
      SQTM_DB_USERNAME: squashtm
      SQTM_DB_PASSWORD: squashtm
    volumes:
      - squash_logs:/opt/squash-tm/logs
      - squash_plugins:/opt/squash-tm/plugins

volumes:
  postgres_data:
  squash_pgdata:
  squash_logs:
  squash_plugins: